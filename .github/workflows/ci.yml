name: Adoption OS CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: adoption-os-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build and validate Glean artifact
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run artifact and agent validation
        run: npm run check

      - name: Ensure generated artifact is committed
        run: npm run check:dist
