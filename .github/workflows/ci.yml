name: Adoption OS CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: adoption-os-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build and validate Glean artifact
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Hermetic browser install (under node_modules) so Playwright does not use a
    # mismatched or partial host/IDE cache. Matches local: PLAYWRIGHT_BROWSERS_PATH=0 npm run ci
    env:
      PLAYWRIGHT_BROWSERS_PATH: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npm run playwright:install

      - name: Run artifact, agent, and iframe validation
        run: npm run ci
